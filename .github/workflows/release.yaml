name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-release
          repository-cache: true
          bazelrc: |
            common --enable_bzlmod

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release ${VERSION}"

      - name: Build all cross-compilation targets
        run: |
          platforms=(darwin_amd64 darwin_arm64 linux_amd64 linux_arm64)
          labels=()

          while IFS='|' read -r tool _; do
            [[ -z "${tool}" || "${tool}" == \#* ]] && continue
            for platform in "${platforms[@]}"; do
              labels+=("//release:${tool}_${platform}")
            done
          done < release/tools.tsv

          bazel build "${labels[@]}"

      - name: Create release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist

          platforms=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
          )

          labels=()
          declare -A TARGETS
          while IFS='|' read -r tool _; do
            [[ -z "${tool}" || "${tool}" == \#* ]] && continue
            for platform in "${platforms[@]}"; do
              read -r os arch <<< "${platform}"
              target="${tool}_${os}_${arch}"
              labels+=("//release:${target}")
              TARGETS["${target}"]="${tool} ${os} ${arch}"
            done
          done < release/tools.tsv

          declare -A BINARY_PATHS
          while IFS=$'\t' read -r target path; do
            BINARY_PATHS["${target}"]="${path}"
          done < <(
            bazel cquery "set(${labels[*]})" \
              --output=starlark \
              --starlark:expr 'target.label.name + "\t" + target.files.to_list()[0].path' \
              2>/dev/null
          )

          for target in "${!TARGETS[@]}"; do
            read -r tool os arch <<< "${TARGETS[$target]}"
            archive_name="${tool}-${VERSION}-${os}-${arch}.tar.gz"
            binary_path="${BINARY_PATHS[$target]}"
            if [[ -z "${binary_path}" ]]; then
              echo "No binary output found for //release:${target}" >&2
              exit 1
            fi

            tmp_dir="$(mktemp -d)"
            cp "${binary_path}" "${tmp_dir}/${tool}"
            tar -czf "dist/${archive_name}" -C "${tmp_dir}" "${tool}"
            rm -rf "${tmp_dir}"

            echo "Created dist/${archive_name}"
          done

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Generate GitHub App token
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: bazelment
          repositories: homebrew-tap

      - name: Update Homebrew tap
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Strip the 'v' prefix for the formula version
          FORMULA_VERSION="${VERSION#v}"

          # Read checksums into an associative array
          cd dist
          declare -A SHAS
          while read -r sha file; do
            SHAS["${file}"]="${sha}"
          done < checksums.txt
          cd ..

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/bazelment/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula

          while IFS='|' read -r tool _ formula_class formula_desc formula_test; do
            [[ -z "${tool}" || "${tool}" == \#* ]] && continue
            sed -e "s/{{.Tool}}/${tool}/g" \
                -e "s/{{.Class}}/${formula_class}/g" \
                -e "s/{{.Description}}/${formula_desc}/g" \
                -e "s/{{.TestText}}/${formula_test}/g" \
                -e "s/{{.Version}}/${FORMULA_VERSION}/g" \
                -e "s/{{.DarwinArm64SHA256}}/${SHAS["${tool}-${VERSION}-darwin-arm64.tar.gz"]}/g" \
                -e "s/{{.DarwinAmd64SHA256}}/${SHAS["${tool}-${VERSION}-darwin-amd64.tar.gz"]}/g" \
                -e "s/{{.LinuxArm64SHA256}}/${SHAS["${tool}-${VERSION}-linux-arm64.tar.gz"]}/g" \
                -e "s/{{.LinuxAmd64SHA256}}/${SHAS["${tool}-${VERSION}-linux-amd64.tar.gz"]}/g" \
                packaging/homebrew/formula.rb.tmpl > "/tmp/homebrew-tap/Formula/${tool}.rb"
          done < release/tools.tsv

          # Commit and push
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update formulas to ${VERSION}"
          git push
