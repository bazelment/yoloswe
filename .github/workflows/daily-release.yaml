name: Daily Release

on:
  schedule:
    # Run daily at 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch: {} # Allow manual trigger

permissions:
  contents: write

# Ensure only one daily-release run executes at a time to prevent tag races.
# cancel-in-progress: false so a queued run still executes after the current
# one finishes (unlike CI where stale runs are cancelled).
concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  daily-release:
    name: Tag Daily Release
    runs-on: ubuntu-latest
    # Only run on the main branch to prevent accidental releases from feature branches.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for changes since last release
        id: check
        run: |
          # Use --match to scope only to CalVer release tags (v*), avoiding
          # non-release tags that could skew the "new commits" baseline.
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, will create release"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$(git rev-list "${LAST_TAG}..HEAD" --count)" -gt 0 ]; then
            echo "Found new commits since ${LAST_TAG}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes since ${LAST_TAG}, skipping"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App token
        id: app-token
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: bazelment
          repositories: yoloswe

      - name: Create and push tag
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="v$(date -u +%Y.%m.%d)"

          # Handle multiple releases on the same day
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            SUFFIX=1
            while git rev-parse "${TAG}.${SUFFIX}" >/dev/null 2>&1; do
              SUFFIX=$((SUFFIX + 1))
            done
            TAG="${TAG}.${SUFFIX}"
          fi

          echo "Creating tag ${TAG}"
          # Use GitHub App token so the tag push triggers release.yaml.
          # Tags pushed with the default GITHUB_TOKEN don't trigger workflows.
          git config url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git tag "${TAG}"
          git push origin "${TAG}"
