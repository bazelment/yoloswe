name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Install golangci-lint
        run: |
          GOLANGCI_LINT_VERSION="2.11.4"
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz" | tar -xz -C "$(go env GOPATH)/bin" --strip-components=1 "golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint"
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install buildifier
        run: |
          BUILDIFIER_VERSION="8.0.3"
          curl -sSL "https://github.com/bazelbuild/buildtools/releases/download/v${BUILDIFIER_VERSION}/buildifier-linux-amd64" -o buildifier
          chmod +x buildifier
          sudo mv buildifier /usr/local/bin/

      - name: Run lint checks
        run: ./scripts/lint.sh

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build-and-test
          repository-cache: true
          bazelrc: |
            common --enable_bzlmod

      - name: Build all targets
        run: bazel build //...

      - name: Test all targets
        run: bazel test //... --test_output=errors
