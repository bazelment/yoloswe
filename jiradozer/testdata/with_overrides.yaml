tracker:
  kind: linear
  api_key: test-key

agent:
  model: sonnet
  effort: medium

max_budget_usd: 50.0

plan:
  prompt: "Plan {{.Identifier}}"
  comment_template: "## {{.Heading}} Complete\n\n{{.Output}}"
  model: opus
  effort: high
  max_budget_usd: 10.0
  max_turns: 5

build:
  prompt: "Build {{.Identifier}}"
  comment_template: "## {{.Heading}} Complete\n\n{{.Output}}"
  model: ""
  max_budget_usd: 0

create_pr:
  prompt: "Open PR"
  comment_template: "## {{.Heading}} Complete\n\n{{.Output}}"
validate:
  prompt: "Run tests"
  comment_template: "## {{.Heading}} Complete\n\n{{.Output}}"
ship:
  prompt: "Ship it"
  comment_template: "## {{.Heading}} Complete\n\n{{.Output}}"
