# jiradozer.yaml — generated by `jiradozer bootstrap`. Edit prompts to taste.
#
# Template variables in step prompts and round prompts:
#   {{.Identifier}} {{.Title}} {{.Description}} {{.URL}} {{.Labels}}
#   {{.BaseBranch}} {{.Plan}} {{.BuildOutput}}
#
# Template variables in comment_template / round_comment_template:
#   {{.Step}} {{.Heading}} {{.Output}} {{.Round}} {{.TotalRounds}}

tracker:
    kind: linear
    api_key: $LINEAR_API_KEY
source:
    filters:
        state: Todo
        team: ENG
    branch_prefix: jiradozer
    max_concurrent: 3
    dry_run: false
states:
    in_progress: In Progress
    in_review: In Review
    done: Done
agent:
    model: sonnet
    effort: ""
work_dir: .
base_branch: main
plan:
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .Description}}

        Description:
        {{.Description}}
        {{- end}}
        {{- if .URL}}

        URL: {{.URL}}
        {{- end}}
        {{- if .Labels}}
        Labels: {{.Labels}}
        {{- end}}

        Create a detailed implementation plan for this issue. Include: files to modify, approach, testing strategy, and any risks.
    system_prompt: ""
    model: ""
    effort: ""
    permission_mode: plan
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    round_comment_template: ""
    rounds: []
    max_budget_usd: 0
    max_turns: 10
    max_tool_error_retries: 0
    auto_approve: false
build:
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .Description}}

        Description:
        {{.Description}}
        {{- end}}
        {{- if .Plan}}

        Approved Plan:
        {{.Plan}}

        Implement the changes described in the approved plan above.
        {{- else}}

        No plan is available. Implement the changes based on the issue description above.
        {{- end}}
    system_prompt: ""
    model: ""
    effort: ""
    permission_mode: bypass
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    rounds: []
    max_budget_usd: 0
    max_turns: 30
    max_tool_error_retries: 0
    auto_approve: false
create_pr:
    prompt: |-
        First, check for any uncommitted changes (staged or unstaged, including untracked files).
        - If there are uncommitted changes: stage them, commit with a clear message referencing the work done, and push to the remote.
        - If there are no uncommitted changes but unpushed commits: push to the remote.

        Then, check if a pull request already exists for the current branch against {{.BaseBranch}}.
        - If a PR exists: update its description to reflect the current state of the code. Report the PR URL.
        - If no PR exists: create one against {{.BaseBranch}} with a clear title and description. Report the PR URL.
    system_prompt: ""
    model: ""
    effort: ""
    permission_mode: bypass
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    round_comment_template: ""
    rounds: []
    max_budget_usd: 0
    max_turns: 5
    max_tool_error_retries: 0
    auto_approve: false
validate:
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}

        Run the project's tests and linters to validate the changes. Fix any failures you find. Report what passed and what you fixed.
    system_prompt: ""
    model: ""
    effort: ""
    permission_mode: bypass
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    rounds: []
    max_budget_usd: 0
    max_turns: 10
    max_tool_error_retries: 0
    auto_approve: false
ship:
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .URL}}

        Linear: {{.URL}}
        {{- end}}

        Check if a pull request already exists for the current branch against {{.BaseBranch}}.
        - If a PR exists: update its description if needed and ensure it is ready for review. Report the PR URL.
        - If no PR exists: create one using gh pr create with "{{.Identifier}}: {{.Title}}" as the title.
    system_prompt: ""
    model: ""
    effort: ""
    permission_mode: bypass
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    rounds: []
    max_budget_usd: 0
    max_turns: 10
    max_tool_error_retries: 0
    auto_approve: false
max_budget_usd: 50
poll_interval: 15s
