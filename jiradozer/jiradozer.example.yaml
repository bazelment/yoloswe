# jiradozer.yaml — generated by `jiradozer bootstrap`. Edit prompts to taste.
#
# How jiradozer works
# ===================
# Jiradozer drives a tracker issue (Linear, GitHub, or local) through five
# agent-run steps:
#
#   plan → build → create_pr → validate → ship
#
#   1. plan      — agent reads the issue and writes an implementation plan
#                  (permission_mode: plan, no code changes).
#   2. build     — agent implements the approved plan in your work_dir.
#   3. create_pr — agent commits, pushes, and opens a PR against base_branch.
#   4. validate  — agent runs tests/linters in the PR branch and fixes failures.
#   5. ship      — agent makes sure the PR is up to date and ready for review.
#
# After plan, build, validate, and ship, jiradozer posts the agent's output
# as a comment on the issue and waits at a review gate. Reply on the issue:
#   - "approve" / "lgtm"  → next step
#   - "approve all" / "approve_all" / "yolo" → approve this and all remaining gates in the current run
#   - "redo"              → re-run the current step
#   - any other text      → fed back to the agent as feedback
#
# Each step block below configures one of those agent sessions: the prompt
# rendered with issue data, the comment template posted afterward, the
# permission mode, and turn/budget caps. Optional fields are commented out
# — uncomment to override defaults.
#
# Multi-round steps (advanced)
# ----------------------------
# Any step except create_pr can replace its single `prompt` with a list of
# `rounds` that run sequentially inside one review gate. Each round is either
# an agent run (`prompt:`) or a shell command (`command:` via `sh -c`).
# Per-round comments use `round_comment_template`; the step's review gate
# fires once after the last round. Round-level fields override the step's
# zero-valued ones; feedback from a redo is injected into the first agent
# round only. See the commented `rounds` example under each step.
#
# Template variables in step prompts and round prompts:
#   {{.Identifier}} {{.Title}} {{.Description}} {{.URL}} {{.Labels}}
#   {{.BaseBranch}} {{.Plan}} {{.BuildOutput}}
#
# Template variables in comment_template / round_comment_template:
#   {{.Step}} {{.Heading}} {{.Output}} {{.Round}} {{.TotalRounds}}

# Issue tracker backend.
tracker:
    # Backend kind: "linear", "github", or "local".
    kind: linear
    # API key; supports "$ENV_VAR" expansion. Required for linear.
    # github uses the gh CLI for auth, local needs no key.
    api_key: $LINEAR_API_KEY

# Multi-issue discovery (used when --filter is set or filters is non-empty).
# Single-issue runs (--issue ENG-123) ignore this block.
#source:
#    # Generic key-value filters; see tracker.IssueFilter for keys.
#    filters:
#        state: Todo
#        team: ENG
#    # Worktree branch prefix (default: jiradozer).
#    branch_prefix: jiradozer
#    # Max parallel workflows (default: 3).
#    max_concurrent: 3
#    # Print equivalent bramble new-session command instead of launching a workflow.
#    dry_run: false

# Logical workflow states → tracker state names.
states:
    in_progress: In Progress
    in_review: In Review
    done: Done

# Default agent backend; per-step overrides win when set.
agent:
    # Model ID from agent.AllModels (e.g. "sonnet", "opus", "fable", "gpt-5.5",
    # "gemini-3.1-pro-preview", "cursor-default").
    model: sonnet
    # Models to fall back to (in order) when the primary model fails with a
    # workspace-wide "out of credits" error. A same-provider swap can't escape
    # an out-of-credits workspace, so name a model on a *different* provider.
    # Failover starts a fresh session (cross-provider resume is unreliable).
    # Empty = no fallback. Per-step `fallback_models:` overrides this.
    #fallback_models: [opus]
    # Reasoning effort: low, medium, high, max, auto. Empty = provider default.
    # Note: when a fallback model's provider has no effort knob (cursor, gemini,
    # agy), the effort is dropped automatically for that model's run.
    #effort: ""
    # Proactively read Claude plan usage (/api/oauth/usage) before each Claude
    # run and skip to the next fallback when this model's utilization is at the
    # limit. Set true to disable — then jiradozer only falls back reactively
    # after a real out-of-credits error. Default false.
    #disable_limit_preflight: false
    # Optional: route inference through a third-party LLM API endpoint
    # (Baseten, OpenRouter, LiteLLM, etc.). The claude backend requires an
    # Anthropic-shaped endpoint; codex/gemini accept OpenAI-compatible.
    #llm_endpoint:
    #    base_url: https://inference.baseten.co/v1
    #    api_key_env: BASETEN_API_KEY    # prefer over api_key
    #    provider_name: baseten
    #    wire_api: chat                  # "chat" (OpenAI-compat) or "responses"
    #    headers:                        # optional extra HTTP headers (codex only)
    #        X-Custom-Header: value

# Working directory for the agent (where it runs commands and edits files).
work_dir: .

# Default base branch for PRs.
base_branch: main

# Optional phases to skip for every run. Skipped phases advance in-memory
# workflow state and clear stale -inprogress labels, but do not write -done
# labels; use tracker labels like jiradozer-plan-done for durable completion.
# Tracker labels like jiradozer-skip-plan are also honored; label editors are
# trusted to bypass the matching phase.
#skip_phases: [plan]

# ---- plan — write an implementation plan ----
# Agent reads the issue and writes an approach. permission_mode is `plan` so
# it cannot edit files. Output is posted to the issue and gated on a human
# reply.
plan:
    # Initial prompt; Go text/template rendered with issue data (PromptData).
    # Required unless `rounds` is set.
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .Description}}

        Description:
        {{.Description}}
        {{- end}}
        {{- if .URL}}

        URL: {{.URL}}
        {{- end}}
        {{- if .Labels}}
        Labels: {{.Labels}}
        {{- end}}

        Create a detailed implementation plan for this issue. Include: files to modify, approach, testing strategy, and any risks.
    # Comment posted to the issue when this step finishes (single-shot mode).
    # Required unless this step uses `rounds` only.
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    # Agent permission mode: plan, bypass, default, acceptEdits.
    permission_mode: plan
    # Max agent turns before giving up (Claude provider only).
    max_turns: 10
    # Parent kills the subprocess if it emits no log line for this long while
    # inside this step. Tracks gap between log lines, not
    # wall-clock-since-start, so a slow-but-progressing
    # agent is not interrupted. 0 disables the watchdog.
    idle_timeout: 5m
    # ----- optional overrides (uncomment to use) -----
    # Optional system prompt prepended to the agent session.
    #system_prompt: ""
    # Override agent.model for this step; empty = inherit.
    #model: ""
    # Override agent.effort for this step; empty = inherit.
    #effort: ""
    # Per-round comment template; required if you set `rounds` below.
    #round_comment_template: ""
    # Multi-round execution. Replaces the single `prompt` above with a
    # sequence of rounds run inside one review gate. Each round is either
    # an agent run (`prompt:`) or a shell command (`command:` via `sh -c`).
    # Per-round comments use `round_comment_template`; the step's review
    # gate fires once after the last round. Round-level fields override
    # the step's zero-valued ones; redo feedback is injected into the
    # first agent round only. Mutually exclusive with `prompt` above —
    # delete the prompt field when you enable rounds.
    #
    # Per-round override fields (all optional, 0/empty = inherit from step):
    #   model, system_prompt, max_turns, max_budget_usd, max_tool_error_retries
    #
    # WARNING for command rounds: {{.Title}} / {{.Description}} come from
    # the tracker and are user-controlled. Only interpolate them when the
    # issue source is fully trusted. Feedback is not injected into commands.
    #rounds:
    #    - prompt: |-
    #          Round 1 work for {{.Identifier}} — {{.Title}}.
    #      max_turns: 15
    #    - command: "go test ./..."
    # Step-level budget cap in USD; 0 = inherit max_budget_usd.
    #max_budget_usd: 0
    # Auto-retry when a turn ends with an unresolved tool error.
    #max_tool_error_retries: 0
    # Grace period a turn waits, after completion, for outstanding background
    # work (e.g. bramble reviewers a skill backgrounds) to finish before the
    # turn is force-completed; 0 = provider default (10m). Raise it for steps
    # that launch long-running background tools.
    #stream_turn_grace_period: 0
    # Skip the human review gate after this step.
    #auto_approve: false

# ---- build — implement the approved plan ----
# Agent edits files in work_dir to satisfy the plan. permission_mode is
# `bypass` so it can run tools without per-call prompts.
build:
    # Initial prompt; Go text/template rendered with issue data (PromptData).
    # Required unless `rounds` is set.
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .Description}}

        Description:
        {{.Description}}
        {{- end}}
        {{- if .Plan}}

        Approved Plan:
        {{.Plan}}

        Implement the changes described in the approved plan above.
        {{- else}}

        No plan is available. Implement the changes based on the issue description above.
        {{- end}}
    # Comment posted to the issue when this step finishes (single-shot mode).
    # Required unless this step uses `rounds` only.
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    # Agent permission mode: plan, bypass, default, acceptEdits.
    permission_mode: bypass
    # Max agent turns before giving up (Claude provider only).
    max_turns: 30
    # Parent kills the subprocess if it emits no log line for this long while
    # inside this step. Build runs the longest because tests can take many
    # minutes; the gap-based watchdog only trips when
    # output truly stops.
    idle_timeout: 20m
    # Per-round comment posted when this step runs as multi-round.
    # Validated even when `rounds` is empty so a typo here fails fast.
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    # ----- optional overrides (uncomment to use) -----
    # Optional system prompt prepended to the agent session.
    #system_prompt: ""
    # Override agent.model for this step; empty = inherit.
    #model: ""
    # Override agent.effort for this step; empty = inherit.
    #effort: ""
    # Multi-round execution. Replaces the single `prompt` above with a
    # sequence of rounds run inside one review gate. Each round is either
    # an agent run (`prompt:`) or a shell command (`command:` via `sh -c`).
    # Per-round comments use `round_comment_template`; the step's review
    # gate fires once after the last round. Round-level fields override
    # the step's zero-valued ones; redo feedback is injected into the
    # first agent round only. Mutually exclusive with `prompt` above —
    # delete the prompt field when you enable rounds.
    #
    # Per-round override fields (all optional, 0/empty = inherit from step):
    #   model, system_prompt, max_turns, max_budget_usd, max_tool_error_retries
    #
    # WARNING for command rounds: {{.Title}} / {{.Description}} come from
    # the tracker and are user-controlled. Only interpolate them when the
    # issue source is fully trusted. Feedback is not injected into commands.
    #rounds:
    #    - prompt: |-
    #          Round 1 work for {{.Identifier}} — {{.Title}}.
    #      max_turns: 15
    #    - command: "go test ./..."
    # Step-level budget cap in USD; 0 = inherit max_budget_usd.
    #max_budget_usd: 0
    # Auto-retry when a turn ends with an unresolved tool error.
    #max_tool_error_retries: 0
    # Grace period a turn waits, after completion, for outstanding background
    # work (e.g. bramble reviewers a skill backgrounds) to finish before the
    # turn is force-completed; 0 = provider default (10m). Raise it for steps
    # that launch long-running background tools.
    #stream_turn_grace_period: 0
    # Skip the human review gate after this step.
    #auto_approve: false

# ---- create_pr — commit, push, open the PR ----
# Agent stages/commits any pending changes, pushes the branch, and opens (or
# updates) a PR against base_branch. This step does not support `rounds`.
create_pr:
    # Initial prompt; Go text/template rendered with issue data (PromptData).
    # Required unless `rounds` is set.
    prompt: |-
        Your job is purely git + gh: commit and push, then create or update the PR. Do NOT run lint, build, or tests here — the next step (validate) is responsible for the full gate sweep, and re-running them now wastes minutes per issue without changing the code that ships.

        First, check for any uncommitted changes (staged or unstaged, including untracked files).
        - If there are uncommitted changes: stage them, commit with a clear message referencing the work done, and push to the remote.
        - If there are no uncommitted changes but unpushed commits: push to the remote.

        Then, check if a pull request already exists for the current branch against {{.BaseBranch}}.
        - If a PR exists: update its description to reflect the current state of the code. Report the PR URL.
        - If no PR exists: create one against {{.BaseBranch}} with a clear title and description. Report the PR URL.
    # Comment posted to the issue when this step finishes (single-shot mode).
    # Required unless this step uses `rounds` only.
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    # Agent permission mode: plan, bypass, default, acceptEdits.
    permission_mode: bypass
    # Max agent turns before giving up (Claude provider only).
    max_turns: 5
    # Parent kills the subprocess if it emits no log line for this long while
    # inside this step. create_pr is short — gh + git push only — so a
    # tight timeout catches gh hangs quickly.
    idle_timeout: 5m
    # ----- optional overrides (uncomment to use) -----
    # Optional system prompt prepended to the agent session.
    #system_prompt: ""
    # Override agent.model for this step; empty = inherit.
    #model: ""
    # Override agent.effort for this step; empty = inherit.
    #effort: ""
    # Step-level budget cap in USD; 0 = inherit max_budget_usd.
    #max_budget_usd: 0
    # Auto-retry when a turn ends with an unresolved tool error.
    #max_tool_error_retries: 0
    # Grace period a turn waits, after completion, for outstanding background
    # work (e.g. bramble reviewers a skill backgrounds) to finish before the
    # turn is force-completed; 0 = provider default (10m). Raise it for steps
    # that launch long-running background tools.
    #stream_turn_grace_period: 0
    # Skip the human review gate after this step.
    #auto_approve: false

# ---- validate — run tests/linters and fix failures ----
# Agent runs the project's tests and linters in the PR branch and fixes
# anything it broke before handing back to the reviewer.
validate:
    # Initial prompt; Go text/template rendered with issue data (PromptData).
    # Required unless `rounds` is set.
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}

        Run the project's tests and linters to validate the changes. Fix any failures you find. Report what passed and what you fixed.
    # Comment posted to the issue when this step finishes (single-shot mode).
    # Required unless this step uses `rounds` only.
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    # Agent permission mode: plan, bypass, default, acceptEdits.
    permission_mode: bypass
    # Max agent turns before giving up (Claude provider only).
    max_turns: 10
    # Parent kills the subprocess if it emits no log line for this long while
    # inside this step. Validate runs tests + linters (potentially long);
    # the gap-based watchdog only trips when output truly
    # stops.
    idle_timeout: 20m
    # Per-round comment posted when this step runs as multi-round.
    # Validated even when `rounds` is empty so a typo here fails fast.
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    # ----- optional overrides (uncomment to use) -----
    # Optional system prompt prepended to the agent session.
    #system_prompt: ""
    # Override agent.model for this step; empty = inherit.
    #model: ""
    # Override agent.effort for this step; empty = inherit.
    #effort: ""
    # Multi-round execution. Replaces the single `prompt` above with a
    # sequence of rounds run inside one review gate. Each round is either
    # an agent run (`prompt:`) or a shell command (`command:` via `sh -c`).
    # Per-round comments use `round_comment_template`; the step's review
    # gate fires once after the last round. Round-level fields override
    # the step's zero-valued ones; redo feedback is injected into the
    # first agent round only. Mutually exclusive with `prompt` above —
    # delete the prompt field when you enable rounds.
    #
    # Per-round override fields (all optional, 0/empty = inherit from step):
    #   model, system_prompt, max_turns, max_budget_usd, max_tool_error_retries
    #
    # WARNING for command rounds: {{.Title}} / {{.Description}} come from
    # the tracker and are user-controlled. Only interpolate them when the
    # issue source is fully trusted. Feedback is not injected into commands.
    #rounds:
    #    - prompt: |-
    #          Round 1 work for {{.Identifier}} — {{.Title}}.
    #      max_turns: 15
    #    - command: "go test ./..."
    # Step-level budget cap in USD; 0 = inherit max_budget_usd.
    #max_budget_usd: 0
    # Auto-retry when a turn ends with an unresolved tool error.
    #max_tool_error_retries: 0
    # Grace period a turn waits, after completion, for outstanding background
    # work (e.g. bramble reviewers a skill backgrounds) to finish before the
    # turn is force-completed; 0 = provider default (10m). Raise it for steps
    # that launch long-running background tools.
    #
    # validate is poll-heavy (it babysits a background Monitor loop). Cap
    # the grace at 3m so a wedged tool_use is cut off fast and the turn is
    # force-completed + retried rather than burning the full 10m default.
    stream_turn_grace_period: 3m
    # Skip the human review gate after this step.
    #auto_approve: false

# ---- ship — final PR readiness pass ----
# Agent makes sure the PR exists, has a good title/body, and is ready for
# review. Jiradozer does not merge for you — it stops at the ShipReview
# gate.
ship:
    # Initial prompt; Go text/template rendered with issue data (PromptData).
    # Required unless `rounds` is set.
    prompt: |-
        Issue: {{.Identifier}} — {{.Title}}
        {{- if .URL}}

        Linear: {{.URL}}
        {{- end}}

        Check if a pull request already exists for the current branch against {{.BaseBranch}}.
        - If a PR exists: update its description if needed and ensure it is ready for review. Report the PR URL.
        - If no PR exists: create one using gh pr create with "{{.Identifier}}: {{.Title}}" as the title.
    # Comment posted to the issue when this step finishes (single-shot mode).
    # Required unless this step uses `rounds` only.
    comment_template: |-
        ## {{.Heading}} Complete

        {{.Output}}
    # Agent permission mode: plan, bypass, default, acceptEdits.
    permission_mode: bypass
    # Max agent turns before giving up (Claude provider only).
    max_turns: 10
    # Parent kills the subprocess if it emits no log line for this long while
    # inside this step. Ship is short — gh PR-update only — so a tight
    # timeout catches gh hangs quickly.
    idle_timeout: 5m
    # Per-round comment posted when this step runs as multi-round.
    # Validated even when `rounds` is empty so a typo here fails fast.
    round_comment_template: |-
        ## {{.Heading}} Round {{.Round}}/{{.TotalRounds}}

        {{.Output}}
    # ----- optional overrides (uncomment to use) -----
    # Optional system prompt prepended to the agent session.
    #system_prompt: ""
    # Override agent.model for this step; empty = inherit.
    #model: ""
    # Override agent.effort for this step; empty = inherit.
    #effort: ""
    # Multi-round execution. Replaces the single `prompt` above with a
    # sequence of rounds run inside one review gate. Each round is either
    # an agent run (`prompt:`) or a shell command (`command:` via `sh -c`).
    # Per-round comments use `round_comment_template`; the step's review
    # gate fires once after the last round. Round-level fields override
    # the step's zero-valued ones; redo feedback is injected into the
    # first agent round only. Mutually exclusive with `prompt` above —
    # delete the prompt field when you enable rounds.
    #
    # Per-round override fields (all optional, 0/empty = inherit from step):
    #   model, system_prompt, max_turns, max_budget_usd, max_tool_error_retries
    #
    # WARNING for command rounds: {{.Title}} / {{.Description}} come from
    # the tracker and are user-controlled. Only interpolate them when the
    # issue source is fully trusted. Feedback is not injected into commands.
    #rounds:
    #    - prompt: |-
    #          Round 1 work for {{.Identifier}} — {{.Title}}.
    #      max_turns: 15
    #    - command: "go test ./..."
    # Step-level budget cap in USD; 0 = inherit max_budget_usd.
    #max_budget_usd: 0
    # Auto-retry when a turn ends with an unresolved tool error.
    #max_tool_error_retries: 0
    # Grace period a turn waits, after completion, for outstanding background
    # work (e.g. bramble reviewers a skill backgrounds) to finish before the
    # turn is force-completed; 0 = provider default (10m). Raise it for steps
    # that launch long-running background tools.
    #
    # ship is poll-heavy (it babysits PR readiness via a background Monitor
    # loop). Cap the grace at 3m so a wedged tool_use is cut off fast and
    # the turn is force-completed + retried rather than hanging for the full
    # 10m.
    stream_turn_grace_period: 3m
    # Skip the human review gate after this step.
    #auto_approve: false

# Total budget cap across all steps in a single workflow run.
max_budget_usd: 50

# How often to poll the tracker for new comments at review gates.
poll_interval: 15s

# Failure notification (opt-in). When a run fails after exhausting retries,
# jiradozer posts a comment on the issue (if any) and can send an external
# alert. Both are best-effort: a notification failure never changes the run's
# exit status.
#notify:
#    # Slack incoming-webhook URL. Supports "$ENV_VAR" expansion; leave unset
#    # (or resolving to empty) to disable Slack notification.
#    slack_webhook: $JIRADOZER_SLACK_WEBHOOK
